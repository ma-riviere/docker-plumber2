name: Build and publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Rebuild without Docker layer cache
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 3 1 * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        r_version: ["4.5.3"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build verification image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: verify
          platforms: linux/amd64
          build-args: R_VERSION=${{ matrix.r_version }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild }}
          # Read-scoped PAT for the private auth0r GitHub install during the pre-warm
          secrets: |
            github_pat=${{ secrets.GH_PAT_AUTH0R }}

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: builder
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ma-riviere/docker-plumber2:${{ matrix.r_version }}-builder
          build-args: R_VERSION=${{ matrix.r_version }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild }}
          secrets: |
            github_pat=${{ secrets.GH_PAT_AUTH0R }}

      - name: Build and push runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ma-riviere/docker-plumber2:${{ matrix.r_version }}-runtime
          build-args: R_VERSION=${{ matrix.r_version }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild }}
